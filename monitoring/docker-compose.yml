version: "3.8"

services:

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ids_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: ids_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  evidently_exporter:
    build:
      context: .
      dockerfile: Dockerfile.exporter
    container_name: ids_evidently_exporter
    ports:
      - "8001:8001"
    environment:
      - REFERENCE_DATA_PATH=${REFERENCE_DATA_PATH}
      - CURRENT_DATA_PATH=${CURRENT_DATA_PATH}
      - TARGET_COLUMN=${TARGET_COLUMN:-Label}
      - DRIFT_INTERVAL_SECONDS=${DRIFT_INTERVAL_SECONDS:-300}
      - EXPORTER_PORT=8001
    volumes:
      - ${DATA_ROOT:-../Model/data}:/data:ro
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
