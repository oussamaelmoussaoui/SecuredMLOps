# ─────────────────────────────────────────
#  Secret — credentials sensibles
#
#  ⚠️ NE JAMAIS COMMITER LES VRAIES VALEURS
#  En production : utiliser HashiCorp Vault + External Secrets Operator
#  ou Sealed Secrets de Bitnami.
#
#  Pour Minikube (dev) — créer avec :
#
#  kubectl create secret generic ids-api-secrets \
#    --namespace=securedmlops \
#    --from-literal=DAGSHUB_USER=ton_user \
#    --from-literal=DAGSHUB_TOKEN=ton_token \
#    --from-literal=MLFLOW_TRACKING_USERNAME=ton_user \
#    --from-literal=MLFLOW_TRACKING_PASSWORD=ton_token
# ─────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ids-api-secrets
  namespace: securedmlops
  labels:
    app: ids-api
type: Opaque
stringData:
  # ⚠️ PLACEHOLDERS — remplacer ou utiliser la commande ci-dessus
  DAGSHUB_USER: "REPLACE_ME"
  DAGSHUB_TOKEN: "REPLACE_ME"
  MLFLOW_TRACKING_USERNAME: "REPLACE_ME"
  MLFLOW_TRACKING_PASSWORD: "REPLACE_ME"
