# ─────────────────────────────────────────
#  Deployment — IDS API (XGBoost serving)
#
#  Sécurité (DevSecOps) :
#  - runAsNonRoot + UID non privilégié
#  - readOnlyRootFilesystem
#  - drop ALL capabilities
#  - seccompProfile: RuntimeDefault
#  - resources limits stricts
#  - probes liveness / readiness / startup
#  - topology spread + anti-affinity (HA)
# ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ids-api
  namespace: securedmlops
  labels:
    app: ids-api
    app.kubernetes.io/name: ids-api
    app.kubernetes.io/part-of: securedmlops
    app.kubernetes.io/component: serving
    version: v1
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ids-api
  template:
    metadata:
      labels:
        app: ids-api
        version: v1
      annotations:
        # Scrape Prometheus (Phase 6)
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ids-api-sa
      automountServiceAccountToken: false

      # ─── Sécurité au niveau Pod ────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # ─── Haute disponibilité ───────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ids-api

      containers:
        - name: ids-api
          image: ghcr.io/oussamaelmoussaoui/ids-api:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # ─── Sécurité au niveau Container ──
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

          # ─── Configuration ────────────────
          envFrom:
            - configMapRef:
                name: ids-api-config
            - secretRef:
                name: ids-api-secrets

          # ─── Resources ────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # ─── Probes ───────────────────────
          # Startup : laisse 60s au modèle XGBoost pour se charger
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12   # 60s max
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # ─── Volumes éphémères (readOnlyRootFilesystem oblige) ──
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: cache
          emptyDir:
            sizeLimit: 200Mi

      terminationGracePeriodSeconds: 30
