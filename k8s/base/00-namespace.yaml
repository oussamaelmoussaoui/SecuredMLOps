# ─────────────────────────────────────────
#  Namespace dédié au projet SecuredMLOps
#  Isolation logique + Pod Security Standards (restricted)
# ─────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: securedmlops
  labels:
    name: securedmlops
    app.kubernetes.io/part-of: securedmlops
    # Pod Security Standards — niveau "restricted"
    # Bloque les conteneurs privilégiés, root, hostPath, etc.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
