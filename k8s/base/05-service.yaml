# ─────────────────────────────────────────
#  Service — exposition interne de l'API
#  Type ClusterIP — exposition externe via Ingress
# ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ids-api-service
  namespace: securedmlops
  labels:
    app: ids-api
    app.kubernetes.io/name: ids-api
    app.kubernetes.io/part-of: securedmlops
spec:
  type: ClusterIP
  selector:
    app: ids-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
