# ─────────────────────────────────────────
#  HorizontalPodAutoscaler — autoscaling
#
#  Scale automatiquement entre 3 et 10 pods
#  basé sur l'utilisation CPU et mémoire.
# ─────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ids-api-hpa
  namespace: securedmlops
  labels:
    app: ids-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ids-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    # Scale up rapide en cas de pic
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    # Scale down lent pour éviter le flapping
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
