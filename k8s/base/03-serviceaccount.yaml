# ─────────────────────────────────────────
#  ServiceAccount + RBAC pour l'API IDS
#  Principe du moindre privilège (DevSecOps)
# ─────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ids-api-sa
  namespace: securedmlops
  labels:
    app: ids-api
# Sécurité : on désactive le token monté automatiquement
# (le pod ne fait pas d'appel à l'API K8s)
automountServiceAccountToken: false

---
# Rôle minimal — lecture seule des ConfigMaps du namespace
# (utile si on veut faire du hot-reload de config plus tard)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ids-api-role
  namespace: securedmlops
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ids-api-rolebinding
  namespace: securedmlops
subjects:
  - kind: ServiceAccount
    name: ids-api-sa
    namespace: securedmlops
roleRef:
  kind: Role
  name: ids-api-role
  apiGroup: rbac.authorization.k8s.io
