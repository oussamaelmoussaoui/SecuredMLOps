# ─────────────────────────────────────────
#  values.yaml — paramètres par défaut
#
#  Override par environnement avec :
#  helm install ids-api . -f values-prod.yaml
# ─────────────────────────────────────────

# ─── Image ─────────────────────────────────
image:
  repository: ghcr.io/oussamaelmoussaoui/ids-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# ─── Réplication ───────────────────────────
replicaCount: 3

# ─── Stratégie de déploiement ──────────────
# rolling | canary
deploymentStrategy: canary

# ─── Argo Rollouts (si deploymentStrategy=canary) ──
canary:
  steps:
    - setWeight: 10
    - pause: { duration: 2m }
    - setWeight: 25
    - pause: { duration: 2m }
    - setWeight: 50
    - pause: { duration: 5m }
    - setWeight: 75
    - pause: { duration: 2m }
  analysis:
    enabled: true
    successRate: 0.95
    latencyP95Seconds: 0.1

# ─── Ressources ────────────────────────────
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# ─── Autoscaling ───────────────────────────
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

# ─── Service ───────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# ─── Ingress ───────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: ids-api.local
  tls:
    enabled: true
    secretName: ids-api-tls
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rpm: "100"

# ─── Configuration ─────────────────────────
config:
  logLevel: "INFO"
  mlflowTrackingUri: "http://mlflow-service.securedmlops.svc.cluster.local:5000"
  latencyThresholdMs: 100
  attackDetectionThreshold: 0.70
  driftThreshold: 0.15

# ─── Secrets ───────────────────────────────
# ⚠️ NE JAMAIS commiter les vraies valeurs.
# Override via --set ou --set-file lors du helm install.
secrets:
  dagshubUser: "REPLACE_ME"
  dagshubToken: "REPLACE_ME"
  mlflowUser: "REPLACE_ME"
  mlflowPassword: "REPLACE_ME"

# ─── Sécurité ──────────────────────────────
securityContext:
  pod:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  container:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

# ─── NetworkPolicies ───────────────────────
networkPolicy:
  enabled: true
  defaultDeny: true

# ─── PodDisruptionBudget ───────────────────
pdb:
  enabled: true
  minAvailable: 2

# ─── Monitoring (Phase 6) ──────────────────
monitoring:
  serviceMonitor:
    enabled: false   # activer après installation de Prometheus Operator
    interval: 30s
    path: /metrics
