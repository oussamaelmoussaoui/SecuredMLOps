# ─────────────────────────────────────────
#  values-prod.yaml — Production (AKS/EKS/GKE)
#  helm install ids-api . -f values-prod.yaml
# ─────────────────────────────────────────

replicaCount: 3
deploymentStrategy: canary    # Canary obligatoire en prod

image:
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilization: 70

ingress:
  enabled: true
  host: ids-api.securedmlops.com
  tls:
    enabled: true
    secretName: ids-api-tls-prod
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rpm: "200"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"

config:
  logLevel: "INFO"

networkPolicy:
  enabled: true
  defaultDeny: true

pdb:
  enabled: true
  minAvailable: 2

monitoring:
  serviceMonitor:
    enabled: true
    interval: 15s
