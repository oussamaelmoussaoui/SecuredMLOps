# ─────────────────────────────────────────────────────────────
#  .github/workflows/training.yml
#  Workflow 2 — Entraînement ML Automatisé
# ─────────────────────────────────────────────────────────────

name: "Training — Entraînement ML"

on:
  workflow_dispatch:
    inputs:
      run_preprocessing:
        description: "Relancer le preprocessing complet ?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      experiment_name:
        description: "Nom de l'expérience MLflow"
        required: false
        default: "IDS_CICIDS2017"

  push:
    branches:
      - main
    paths:
      - "Model/src/models/**"
      - "params.yaml"

jobs:
  # ══════════════════════════════════════════════════════
  #  JOB 1 : Préparation des données
  # ══════════════════════════════════════════════════════
  prepare-data:
    name: "Préparation des données"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # ✅ CORRECTION : DVC installé explicitement AVANT de l'utiliser
      - name: "Installation des dépendances"
        run: |
          pip install --upgrade pip
          pip install dvc dvc-s3 dagshub
          pip install -r requirements.txt

      # Configurer DVC avec les credentials DagsHub
      - name: "Configuration DVC — DagsHub"
        run: |
          dvc remote modify dagshub --local auth basic
          dvc remote modify dagshub --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify dagshub --local password ${{ secrets.DAGSHUB_TOKEN }}

      # Récupérer les données versionnées
      - name: "DVC Pull — Récupération données"
        run: |
          dvc pull
          dvc checkout --force

      # Vérifier que les données sont bien présentes
      - name: "Vérification des données"
        run: |
          echo "Vérification Model/data/processed/"
          ls -la Model/data/processed/ || echo "Dossier vide"
          python -c "
          import numpy as np
          from pathlib import Path
          processed = Path('Model/data/processed')
          files = list(processed.glob('*.npy'))
          print(f'Fichiers .npy trouvés : {len(files)}')
          if len(files) == 0:
              raise FileNotFoundError('Données preprocessées manquantes')
          print('Données prêtes ✅')
          "

      # Preprocessing optionnel selon le paramètre d'entrée
      - name: "Preprocessing (si demandé)"
        if: ${{ github.event.inputs.run_preprocessing == 'true' }}
        run: |
          echo "Lancement du preprocessing complet..."
          python Model/src/data/preprocess.py
          python Model/src/data/balance.py

      # Uploader les données comme artifact pour le job suivant
      - name: "Upload données preprocessées"
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: Model/data/processed/
          retention-days: 1

  # ══════════════════════════════════════════════════════
  #  JOB 2 : Entraînement + Évaluation
  # ══════════════════════════════════════════════════════
  train-evaluate:
    name: "Entraînement XGBoost + Évaluation"
    runs-on: ubuntu-latest
    needs: prepare-data

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # ✅ CORRECTION : même fix dans le job 2
      - name: "Installation des dépendances"
        run: |
          pip install --upgrade pip
          pip install dvc dvc-s3 dagshub
          pip install -r requirements.txt

      # Récupérer les données du job précédent
      - name: "Download données preprocessées"
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: Model/data/processed/

      # Configurer MLflow
      - name: "Configuration MLflow"
        run: |
          echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV

      # Lancer l'entraînement
      - name: "Entraînement XGBoost"
        run: |
          echo "Démarrage entraînement..."
          python Model/src/models/train.py
          echo "Entraînement terminé ✅"

      # Évaluer le modèle
      - name: "Évaluation du modèle"
        run: python Model/src/models/evaluate.py

      # Security Gate ML
      - name: "Security Gate — Validation métriques ML"
        run: |
          python -c "
          import numpy as np
          import joblib
          from sklearn.metrics import f1_score, roc_auc_score
          from pathlib import Path

          print('Vérification des seuils de performance...')

          model   = joblib.load('Model/models/saved/xgboost_ids.joblib')
          X_test  = np.load('Model/data/processed/X_test.npy')
          y_test  = np.load('Model/data/processed/y_test.npy')

          y_pred  = model.predict(X_test)
          y_proba = model.predict_proba(X_test)[:, 1]

          f1  = f1_score(y_test, y_pred, average='weighted')
          auc = roc_auc_score(y_test, y_proba)

          print(f'F1-Score : {f1:.4f}')
          print(f'ROC-AUC  : {auc:.4f}')

          if f1 < 0.97:
              raise ValueError(f'F1-Score insuffisant : {f1:.4f} < 0.97 — PIPELINE BLOQUÉ')
          if auc < 0.99:
              raise ValueError(f'ROC-AUC insuffisant : {auc:.4f} < 0.99 — PIPELINE BLOQUÉ')

          print('Toutes les métriques valident les seuils ✅')
          "

      # Uploader le modèle entraîné
      - name: "Upload modèle entraîné"
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: Model/models/saved/
          retention-days: 7

      # Uploader les rapports
      - name: "Upload rapports évaluation"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-reports
          path: Model/docs/
          retention-days: 30
