# ─────────────────────────────────────────────────────────────
# .github/workflows/deploy-production.yml
# Workflow 5 — Déploiement Production via GitOps (ArgoCD)
# Pipeline: commit → ci.yml → training.yml → docker-build-scan.yml → deploy-staging.yml → deploy-production.yml (manuel)
#
# Principe GitOps :
#   Ce workflow met à jour le tag d'image dans k8s/helm/ids-api/values.yaml
#   puis pousse le commit → ArgoCD détecte le changement et synchronise
#   automatiquement le cluster Kubernetes (Minikube ou cloud).
# ─────────────────────────────────────────────────────────────

name: "Deploy Production"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag immuable de l'image à déployer (ex: sha-a1b2c3d). Visible dans le résumé du workflow Docker Build."
        required: true
        default: "sha-a1b2c3d"
      confirm_deploy:
        description: "Confirmer le déploiement en production ?"
        required: true
        type: choice
        options:
          - "OUI_JE_CONFIRME"
          - "NON"
        default: "NON"

permissions:
  contents: write
  actions: read

jobs:

  verify-confirmation:
    name: "Vérification Confirmation"
    runs-on: ubuntu-latest

    steps:
      - name: "Vérifier la confirmation"
        run: |
          if [ "${{ github.event.inputs.confirm_deploy }}" != "OUI_JE_CONFIRME" ]; then
            echo "Déploiement annulé : confirmation non reçue."
            echo "Relancer avec confirm_deploy = OUI_JE_CONFIRME."
            exit 1
          fi

          if [ "${{ github.event.inputs.image_tag }}" = "latest" ]; then
            echo "Le tag latest est interdit en production."
            echo "Utilisez un tag immuable, par exemple : sha-a1b2c3d."
            exit 1
          fi

          if [ "${{ github.event.inputs.image_tag }}" = "sha-a1b2c3d" ]; then
            echo "Le tag par défaut sha-a1b2c3d est un exemple, pas une vraie image."
            echo "Copiez le tag réel depuis le résumé du workflow Docker Build."
            exit 1
          fi

          echo "Confirmation reçue."
          echo "Tag à déployer : ${{ github.event.inputs.image_tag }}"


  deploy-gitops:
    name: "GitOps — Mise à jour ArgoCD"
    runs-on: ubuntu-latest
    needs: verify-confirmation

    environment:
      name: production

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: "Informations déploiement"
        run: |
          echo "════════════════════════════════════"
          echo " DÉPLOIEMENT PRODUCTION — GitOps"
          echo "════════════════════════════════════"
          echo "Image GHCR   : ghcr.io/oussamaelmoussaoui/ids-api:${{ github.event.inputs.image_tag }}"
          echo "Commit Git   : ${{ github.sha }}"
          echo "Déclenché par: ${{ github.actor }}"
          echo "Date UTC     : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "════════════════════════════════════"

      - name: "Mise à jour du tag image dans Helm values"
        run: |
          TAG="${{ github.event.inputs.image_tag }}"

          echo "Mise à jour de k8s/helm/ids-api/values.yaml..."
          echo "  Ancien tag : $(grep 'tag:' k8s/helm/ids-api/values.yaml | head -1 | xargs)"
          echo "  Nouveau tag: $TAG"

          sed -i "s|^  tag:.*|  tag: \"$TAG\"|" k8s/helm/ids-api/values.yaml

          echo "Vérification :"
          grep 'tag:' k8s/helm/ids-api/values.yaml | head -3

      - name: "Commit et push du nouveau tag"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/helm/ids-api/values.yaml

          if git diff --cached --quiet; then
            echo "Aucun changement détecté (même tag déjà déployé)."
            exit 0
          fi

          git commit -m "deploy(production): update ids-api image to ${{ github.event.inputs.image_tag }}

Déployé par : ${{ github.actor }}
Date UTC    : $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          git push origin main

          echo "Commit poussé — ArgoCD va synchroniser automatiquement."

      - name: "Résumé GitOps"
        run: |
          echo "════════════════════════════════════"
          echo " GITOPS DÉCLENCHÉ"
          echo "════════════════════════════════════"
          echo "Tag déployé  : ${{ github.event.inputs.image_tag }}"
          echo "Par          : ${{ github.actor }}"
          echo "Date UTC     : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "ArgoCD synchronise automatiquement dans quelques secondes."
          echo ""
          echo "Pour surveiller le déploiement :"
          echo "  kubectl port-forward svc/argocd-server -n argocd 8080:443"
          echo "  → https://localhost:8080"
          echo ""
          echo "Pour accéder à l'API après sync :"
          echo "  kubectl port-forward svc/ids-api-service -n securedmlops 8000:80"
          echo "  → http://localhost:8000/health"
          echo "════════════════════════════════════"
