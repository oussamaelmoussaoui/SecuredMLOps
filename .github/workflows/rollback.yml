# ─────────────────────────────────────────────────────────────
#  .github/workflows/rollback.yml
#  Workflow 6 — Rollback (Retour Arrière d'Urgence)
# ─────────────────────────────────────────────────────────────
#
#  DÉCLENCHEUR : Manuel uniquement (incident en production)
#
#  CE QUE CE WORKFLOW FAIT :
#  1. Identifie la version précédente stable
#  2. Reploie l'ancienne image Docker
#  3. Vérifie que le rollback a fonctionné
#  4. Notifie l'équipe
#
#  QUAND L'UTILISER :
#  - Nouveau déploiement cause des erreurs en production
#  - Métriques ML dégradées après mise à jour
#  - Incidents de sécurité détectés
# ─────────────────────────────────────────────────────────────

name: "Rollback — Retour Arrière d'Urgence"

on:
  workflow_dispatch:
    inputs:
      rollback_version:
        description: "Tag de la version vers laquelle revenir"
        required: false
        default: "previous"
      reason:
        description: "Raison du rollback (pour les logs d'audit)"
        required: true
        default: "Incident en production"

jobs:
  # ══════════════════════════════════════════════════════
  #  JOB 1 : Rollback
  # ══════════════════════════════════════════════════════
  rollback:
    name: "Rollback Production"
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Informations rollback"
        run: |
          echo "════════════════════════════════════"
          echo "  ROLLBACK D'URGENCE"
          echo "════════════════════════════════════"
          echo "Raison   : ${{ github.event.inputs.reason }}"
          echo "Version  : ${{ github.event.inputs.rollback_version }}"
          echo "Déclenché par : ${{ github.actor }}"
          echo "Date     : $(date)"
          echo "════════════════════════════════════"

      - name: "Login Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Déterminer la version de rollback
      - name: "Identification version rollback"
        id: rollback-version
        run: |
          if [ "${{ github.event.inputs.rollback_version }}" = "previous" ]; then
            # Utiliser le commit Git précédent
            PREV_COMMIT=$(git rev-parse HEAD~1 | cut -c1-7)
            echo "version=sha-${PREV_COMMIT}" >> $GITHUB_OUTPUT
            echo "Rollback vers commit précédent : sha-${PREV_COMMIT}"
          else
            echo "version=${{ github.event.inputs.rollback_version }}" >> $GITHUB_OUTPUT
            echo "Rollback vers : ${{ github.event.inputs.rollback_version }}"
          fi

      # Arrêter la version actuelle
      - name: "Arrêt version actuelle"
        run: |
          echo "Arrêt de la version actuelle..."
          docker stop ids-api-production 2>/dev/null || echo "Conteneur déjà arrêté"
          docker rm ids-api-production 2>/dev/null || echo "Conteneur déjà supprimé"

      # Déployer l'ancienne version
      - name: "Déploiement version précédente"
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/ids-api:${{ steps.rollback-version.outputs.version }}"

          echo "Récupération image : $IMAGE"
          docker pull $IMAGE

          echo "Démarrage ancienne version..."
          docker run -d \
            --name ids-api-production \
            -p 8000:8000 \
            --restart always \
            --label "rollback=true" \
            --label "rollback_reason=${{ github.event.inputs.reason }}" \
            --label "rolled_back_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            $IMAGE

          sleep 30
          echo "Ancienne version démarrée ✅"

      # Vérifier que le rollback fonctionne
      - name: "Vérification rollback"
        run: |
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:8000/health)

          if [ "$HEALTH" = "200" ]; then
            echo "Rollback réussi — API opérationnelle ✅"
          else
            echo "Rollback échoué — HTTP $HEALTH ❌"
            echo "INTERVENTION MANUELLE REQUISE"
            exit 1
          fi

      - name: "Résumé rollback"
        if: always()
        run: |
          echo "════════════════════════════════════"
          echo "  ROLLBACK TERMINÉ"
          echo "════════════════════════════════════"
          echo "Version restaurée : ${{ steps.rollback-version.outputs.version }}"
          echo "Raison            : ${{ github.event.inputs.reason }}"
          echo "Par               : ${{ github.actor }}"
          echo "Heure             : $(date)"
          echo ""
          echo "Action requise : Investiguer et corriger"
          echo "le problème avant de redéployer."
          echo "════════════════════════════════════"
