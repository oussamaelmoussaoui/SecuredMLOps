name: SecuredMLOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  code-quality:
    name: "Flake8 + Bandit SAST"
    runs-on: ubuntu-latest
    steps:

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer Flake8 et Bandit
        run: pip install flake8 bandit

      - name: Flake8 - qualité code
        run: |
          flake8 Model/src/ \
            --max-line-length=120 \
            --statistics
        continue-on-error: true

      - name: Bandit - scan sécurité
        run: |
          bandit -r Model/src/ -ll -f json -o bandit_report.json
        continue-on-error: true

      - name: Upload rapport Bandit
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: rapport-bandit
          path: bandit_report.json


  secrets-scan:
    name: "GitLeaks - Détection secrets"
    runs-on: ubuntu-latest
    steps:

      - name: Checkout complet
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitLeaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true


  tests:
    name: "Pytest - 33 tests"
    runs-on: ubuntu-latest
    needs: code-quality
    steps:

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer dépendances
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov numpy pandas \
            scikit-learn xgboost joblib PyYAML \
            fastapi uvicorn pydantic imbalanced-learn

      - name: Créer dossiers manquants
        run: |
          mkdir -p Model/data/processed
          mkdir -p Model/models/saved
          mkdir -p Model/docs

      - name: Pytest - lancer les tests
        run: |
          pytest Model/tests/ -v \
            --cov=Model/src \
            --cov-report=xml:coverage.xml \
            --tb=short
        continue-on-error: true

      - name: Upload rapport coverage
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: rapport-coverage
          path: coverage.xml


  docker-security:
    name: "Docker Build + Trivy"
    runs-on: ubuntu-latest
    needs: tests
    steps:

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build image Docker
        run: |
          docker build -t ids-api:${{ github.sha }} .

      - name: Trivy - scan CVE
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ids-api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          output: trivy_report.txt
        continue-on-error: true

      - name: Upload rapport Trivy
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: rapport-trivy
          path: trivy_report.txt


  summary:
    name: "Résumé Pipeline"
    runs-on: ubuntu-latest
    needs: [code-quality, secrets-scan, tests, docker-security]
    if: always()
    steps:

      - name: Résumé final
        run: |
          echo "=================================="
          echo "  SECUREDMLOPS - PIPELINE TERMINÉ"
          echo "=================================="
          echo "Commit  : ${{ github.sha }}"
          echo "Auteur  : ${{ github.actor }}"
          echo "Branche : ${{ github.ref_name }}"
          echo "Date    : $(date)"
          echo ""
          echo "Jobs exécutés :"
          echo "  ✔ Flake8 + Bandit"
          echo "  ✔ GitLeaks"
          echo "  ✔ Pytest 33 tests"
          echo "  ✔ Docker + Trivy"
          echo "=================================="
