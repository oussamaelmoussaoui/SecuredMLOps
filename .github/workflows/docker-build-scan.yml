# ─────────────────────────────────────────────────────────────
#  .github/workflows/docker-build-scan.yml
#  Workflow 3 — Build Docker + Scan Sécurité Container
# ─────────────────────────────────────────────────────────────

name: "Docker — Build & Scan Sécurité"

on:
  workflow_run:
    workflows: ["CI — Tests & Sécurité Code"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  # ══════════════════════════════════════════════════════
  #  JOB 1 : Build de l'image Docker
  # ══════════════════════════════════════════════════════
  docker-build:
    name: "Build Image Docker"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Génération des métadonnées Docker"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ids-api
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: "Login Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Setup Docker BuildKit"
        uses: docker/setup-buildx-action@v3

      - name: "Build image Docker — ids-api"
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: "Informations image Docker"
        run: |
          echo "Image buildée avec succès ✅"
          docker images | grep ids-api

  # ══════════════════════════════════════════════════════
  #  JOB 2 : Scan de sécurité avec Trivy
  # ══════════════════════════════════════════════════════
  trivy-scan:
    name: "Scan Sécurité — Trivy (CVE)"
    runs-on: ubuntu-latest
    needs: docker-build
    # ✅ CORRECTION : permissions nécessaires pour upload SARIF
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Docker BuildKit"
        uses: docker/setup-buildx-action@v3

      - name: "Build image pour scan"
        run: docker build -t ids-api:scan .

      - name: "Scan Trivy — Vulnérabilités container"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ids-api:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: "Rapport Trivy — Texte"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ids-api:scan"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      # ✅ CORRECTION : upload SARIF fonctionne maintenant
      - name: "Upload résultats vers GitHub Security"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: "Upload rapport Trivy"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-results.sarif
          retention-days: 30

  # ══════════════════════════════════════════════════════
  #  JOB 3 : Push de l'image si scan OK
  # ══════════════════════════════════════════════════════
  docker-push:
    name: "Push Image Docker Hub"
    runs-on: ubuntu-latest
    needs: [docker-build, trivy-scan]

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Login Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Setup Docker BuildKit"
        uses: docker/setup-buildx-action@v3

      - name: "Build et Push image finale"
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ids-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ids-api:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: "Image pushée avec succès"
        run: |
          echo "════════════════════════════════════"
          echo "Image pushée sur Docker Hub ✅"
          echo "Tag latest : ${{ secrets.DOCKERHUB_USERNAME }}/ids-api:latest"
          echo "Tag commit : ${{ secrets.DOCKERHUB_USERNAME }}/ids-api:${{ github.sha }}"
          echo "════════════════════════════════════"
