# ─────────────────────────────────────────────────────────────
# .github/workflows/docker-build-scan.yml
# Workflow 3 — Build Docker + Scan Sécurité Container
# Pipeline: commit → ci.yml → training.yml → docker-build-scan.yml → deploy-staging.yml → deploy-production.yml (manuel)
# ─────────────────────────────────────────────────────────────

name: "Docker — Build & Scan Sécurité"

on:
  # Déclenché après le succès de Training (et non directement après CI)
  workflow_run:
    workflows: ["Training — Entraînement ML"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  packages: write

jobs:

  docker-build-scan-push:
    name: "Build, Scan Trivy & Push Docker Hub"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Définir tags Docker"
        id: vars
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/ids-api" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=ghcr.io/oussamaelmoussaoui/ids-api" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: "Setup Python 3.10 pour DVC"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Installer DVC + DagsHub"
        run: |
          python -m pip install --upgrade pip
          pip install dvc dagshub

      - name: "Configurer DVC — DagsHub"
        run: |
          dvc remote modify dagshub --local auth basic
          dvc remote modify dagshub --local user "${{ secrets.DAGSHUB_USERNAME }}"
          dvc remote modify dagshub --local password "${{ secrets.DAGSHUB_TOKEN }}"

      - name: "Récupérer le modèle versionné"
        run: |
          echo "Récupération du modèle depuis DVC/DagsHub..."

          if [ ! -f "Model/models/saved/xgboost_ids.joblib.dvc" ]; then
            echo "Pointeur DVC manquant : Model/models/saved/xgboost_ids.joblib.dvc"
            echo "Lancez d'abord le workflow Training pour versionner le modèle avec DVC."
            exit 1
          fi

          dvc pull -r dagshub Model/models/saved/xgboost_ids.joblib.dvc

          if [ ! -f "Model/models/saved/xgboost_ids.joblib" ]; then
            echo "Modèle manquant : Model/models/saved/xgboost_ids.joblib"
            echo "Le modèle n'a pas été récupéré depuis DVC/DagsHub."
            exit 1
          fi

          echo "Modèle trouvé ✅"
          ls -lh Model/models/saved/

      - name: "Login Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Login GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup Docker BuildKit"
        uses: docker/setup-buildx-action@v3

      - name: "Build image Docker locale"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.ghcr_image }}:latest
            ${{ steps.vars.outputs.ghcr_image }}:${{ steps.vars.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.title=SecuredMLOps IDS API
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Scan Trivy — Rapport SARIF"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: "Scan Trivy — Gate sécurité CRITICAL"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}"
          format: "table"
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      - name: "Upload résultats Trivy vers GitHub Security"
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: "trivy-results.sarif"

      - name: "Upload rapport Trivy"
        uses: actions/upload-artifact@v4
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          name: trivy-security-report
          path: trivy-results.sarif
          retention-days: 30

      - name: "Push images — Docker Hub + GHCR"
        run: |
          docker push "${{ steps.vars.outputs.image }}:latest"
          docker push "${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}"
          docker push "${{ steps.vars.outputs.ghcr_image }}:latest"
          docker push "${{ steps.vars.outputs.ghcr_image }}:${{ steps.vars.outputs.sha_tag }}"

      - name: "Résumé Docker"
        run: |
          echo "════════════════════════════════════"
          echo " IMAGES VALIDÉES ET PUSHÉES"
          echo "════════════════════════════════════"
          echo "Docker Hub : ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha_tag }}"
          echo "GHCR       : ${{ steps.vars.outputs.ghcr_image }}:${{ steps.vars.outputs.sha_tag }}"
          echo "Commit     : ${{ github.sha }}"
          echo "════════════════════════════════════"
          echo ""
          echo "Tag à utiliser pour deploy-production :"
          echo "${{ steps.vars.outputs.sha_tag }}"
