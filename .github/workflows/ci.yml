# ─────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
# Workflow 1 — Intégration Continue + Sécurité Code
# ─────────────────────────────────────────────────────────────
name: "CI — Tests & Sécurité Code"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  tests:
    name: "Tests Unitaires (pytest)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Installation des dépendances"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Lancement des tests unitaires"
        run: |
          pytest Model/tests/ -v \
            --cov=Model/src \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: "Upload rapport couverture"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  sast-bandit:
    name: "SAST — Bandit (Sécurité Code Python)"
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Installation de Bandit"
        run: pip install bandit[toml]

      # CORRECTION : --exit-zero supprimé → Bandit bloque vraiment le pipeline si HIGH trouvé
      - name: "Scan Bandit — Analyse statique"
        run: |
          bandit -r Model/src/ \
            -ll \
            -f json \
            -o bandit-report.json

      - name: "Affichage résumé Bandit"
        if: always()
        run: |
          bandit -r Model/src/ -ll -f txt || true

      - name: "Upload rapport Bandit"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  dependency-scan:
    name: "Scan Dépendances — Safety"
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Installation Safety"
        run: pip install safety

      - name: "Scan Safety — Vulnérabilités dépendances"
        run: |
          pip install -r requirements.txt
          safety check \
            --file requirements.txt \
            --json \
            --output safety-report.json \
            --continue-on-error
        continue-on-error: true

      - name: "Upload rapport Safety"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-dependency-report
          path: safety-report.json
          retention-days: 30

  secrets-scan:
    name: "Scan Secrets — GitLeaks"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout du code (historique complet)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # CORRECTION : continue-on-error supprimé → un secret exposé bloque le pipeline
      - name: "Scan GitLeaks — Détection secrets"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-summary:
    name: "Résumé CI"
    runs-on: ubuntu-latest
    needs: [tests, sast-bandit, dependency-scan, secrets-scan]
    if: always()
    steps:
      - name: "Résumé des résultats CI"
        run: |
          echo "════════════════════════════════════"
          echo " RÉSUMÉ CI — SecuredMLOps"
          echo "════════════════════════════════════"
          echo "Tests unitaires : ${{ needs.tests.result }}"
          echo "Bandit SAST     : ${{ needs.sast-bandit.result }}"
          echo "Safety deps     : ${{ needs.dependency-scan.result }}"
          echo "GitLeaks secrets: ${{ needs.secrets-scan.result }}"
          echo "════════════════════════════════════"
