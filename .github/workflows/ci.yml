# ─────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
# Workflow 1 — Intégration Continue + Sécurité Code
# ─────────────────────────────────────────────────────────────

name: "CI — Tests & Sécurité Code"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  tests:
    name: "Tests Unitaires & Coverage"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Installation des dépendances"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: "Lancement des tests unitaires"
        run: |
          pytest Model/tests/ -v \
            --cov=Model/src \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: "Upload rapport couverture"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7


  code-quality:
    name: "Qualité Code — Ruff"
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Installation Ruff"
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: "Analyse qualité du code"
        run: |
          ruff check Model/src Model/tests


  sast-bandit:
    name: "SAST — Bandit"
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Installation Bandit"
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: "Scan Bandit — Rapport JSON"
        run: |
          bandit -r Model/src/ \
            -ll \
            -f json \
            -o bandit-report.json

      - name: "Affichage résumé Bandit"
        if: always()
        run: |
          bandit -r Model/src/ -ll -f txt || true

      - name: "Upload rapport Bandit"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30


  dependency-scan:
    name: "Scan Dépendances — pip-audit"
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Installation pip-audit"
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: "Scan dépendances vulnérables"
        run: |
          pip-audit -r requirements.txt \
            -f json \
            -o pip-audit-report.json

      - name: "Upload rapport dépendances"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-vulnerability-report
          path: pip-audit-report.json
          retention-days: 30


  secrets-scan:
    name: "Scan Secrets — GitLeaks"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout du code avec historique complet"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Scan GitLeaks — Détection secrets"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  ci-summary:
    name: "Résumé CI"
    runs-on: ubuntu-latest
    needs: [tests, code-quality, sast-bandit, dependency-scan, secrets-scan]
    if: always()

    steps:
      - name: "Résumé des résultats CI"
        run: |
          echo "════════════════════════════════════"
          echo " RÉSUMÉ CI — SecuredMLOps"
          echo "════════════════════════════════════"
          echo "Tests unitaires : ${{ needs.tests.result }}"
          echo "Qualité code    : ${{ needs.code-quality.result }}"
          echo "Bandit SAST     : ${{ needs.sast-bandit.result }}"
          echo "Dépendances     : ${{ needs.dependency-scan.result }}"
          echo "GitLeaks secrets: ${{ needs.secrets-scan.result }}"
          echo "════════════════════════════════════"

      - name: "Échec si un job critique a échoué"
        run: |
          if [ "${{ needs.tests.result }}" != "success" ] || \
             [ "${{ needs.code-quality.result }}" != "success" ] || \
             [ "${{ needs.sast-bandit.result }}" != "success" ] || \
             [ "${{ needs.dependency-scan.result }}" != "success" ] || \
             [ "${{ needs.secrets-scan.result }}" != "success" ]; then
            echo "Un ou plusieurs contrôles CI/Sécurité ont échoué."
            exit 1
          fi
