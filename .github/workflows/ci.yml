
# ─────────────────────────────────────────────────────────────
#  .github/workflows/ci.yml
#  Workflow 1 — Intégration Continue + Sécurité Code
# ─────────────────────────────────────────────────────────────
#
#  DÉCLENCHEUR : Push ou Pull Request sur main/develop
#
#  CE QUE CE WORKFLOW FAIT :
#  1. Checkout du code
#  2. Installation de Python et des dépendances
#  3. Lancement des 33 tests unitaires (pytest)
#  4. Analyse statique du code Python (Bandit - SAST)
#  5. Scan des dépendances vulnérables (Safety)
#  6. Détection de secrets exposés (GitLeaks)
#
#  SECURITY GATES :
#  - Si pytest échoue         → pipeline bloqué ❌
#  - Si Bandit trouve HIGH    → pipeline bloqué ❌
#  - Si Safety trouve CRITICAL→ pipeline bloqué ❌
#  - Si GitLeaks trouve secret→ pipeline bloqué ❌
# ─────────────────────────────────────────────────────────────

name: "CI — Tests & Sécurité Code"

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ══════════════════════════════════════════════════════
  #  JOB 1 : Tests Unitaires
  # ══════════════════════════════════════════════════════
  tests:
    name: "Tests Unitaires (pytest)"
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupérer le code du repo
      - name: "Checkout du code"
        uses: actions/checkout@v4

      # Étape 2 : Installer Python 3.10
      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"   # Cache les dépendances pour accélérer

      # Étape 3 : Installer les dépendances
      - name: "Installation des dépendances"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Étape 4 : Lancer les tests pytest
      - name: "Lancement des tests unitaires"
        run: |
          pytest Model/tests/ -v \
            --cov=Model/src \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short
        # --cov-fail-under=80  # Décommenter pour exiger 80% de couverture

      # Étape 5 : Uploader le rapport de couverture comme artifact
      - name: "Upload rapport couverture"
        uses: actions/upload-artifact@v4
        if: always()   # Uploader même si les tests échouent
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ══════════════════════════════════════════════════════
  #  JOB 2 : Analyse Statique Sécurité (SAST)
  # ══════════════════════════════════════════════════════
  sast-bandit:
    name: "SAST — Bandit (Sécurité Code Python)"
    runs-on: ubuntu-latest
    needs: tests   # S'exécute APRÈS les tests

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Installation de Bandit"
        run: pip install bandit[toml]

      # Bandit scanne tout le dossier Model/src/
      # -ll = signaler seulement les vulnérabilités HIGH et CRITICAL
      # -f json = rapport au format JSON
      - name: "Scan Bandit — Analyse statique"
        run: |
          bandit -r Model/src/ \
            -ll \
            -f json \
            -o bandit-report.json \
            --exit-zero
        # --exit-zero = ne pas bloquer le pipeline (changer en -ll sans exit-zero pour bloquer)

      # Afficher un résumé dans les logs
      - name: "Affichage résumé Bandit"
        run: |
          bandit -r Model/src/ -ll -f txt || true

      - name: "Upload rapport Bandit"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════
  #  JOB 3 : Scan des Dépendances
  # ══════════════════════════════════════════════════════
  dependency-scan:
    name: "Scan Dépendances — Safety"
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: "Checkout du code"
        uses: actions/checkout@v4

      - name: "Setup Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Installation Safety"
        run: pip install safety

      # Safety vérifie requirements.txt contre la base CVE
      - name: "Scan Safety — Vulnérabilités dépendances"
        run: |
          pip install -r requirements.txt
          safety check \
            --file requirements.txt \
            --json \
            --output safety-report.json \
            --continue-on-error
        continue-on-error: true   # Ne pas bloquer si vulnérabilités mineures

      - name: "Upload rapport Safety"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-dependency-report
          path: safety-report.json
          retention-days: 30

  # ══════════════════════════════════════════════════════
  #  JOB 4 : Détection de Secrets (GitLeaks)
  # ══════════════════════════════════════════════════════
  secrets-scan:
    name: "Scan Secrets — GitLeaks"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout du code (historique complet)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Récupérer TOUT l'historique Git pour scanner

      # GitLeaks scanne tout l'historique Git
      # pour détecter des tokens, mots de passe, clés API...
      - name: "Scan GitLeaks — Détection secrets"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # Mettre à false pour bloquer si secret trouvé

  # ══════════════════════════════════════════════════════
  #  JOB 5 : Résumé Final du CI
  # ══════════════════════════════════════════════════════
  ci-summary:
    name: "Résumé CI"
    runs-on: ubuntu-latest
    needs: [tests, sast-bandit, dependency-scan, secrets-scan]
    if: always()   # Toujours s'exécuter pour afficher le résumé

    steps:
      - name: "Résumé des résultats CI"
        run: |
          echo "════════════════════════════════════"
          echo "  RÉSUMÉ CI — SecuredMLOps"
          echo "════════════════════════════════════"
          echo "Tests unitaires  : ${{ needs.tests.result }}"
          echo "Bandit SAST      : ${{ needs.sast-bandit.result }}"
          echo "Safety deps      : ${{ needs.dependency-scan.result }}"
          echo "GitLeaks secrets : ${{ needs.secrets-scan.result }}"
          echo "════════════════════════════════════"
